name: CI

on:
  push:
    branches: [master]
  pull_request:

# A new push to a PR cancels in-flight runs for the same ref so we don't
# burn minutes on outdated commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-macos:
    name: Test (macOS, Swift 6)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        # macos-15 ships Xcode 16+ as the default, which provides Swift 6.0.
        # Print the version so failed runs make the toolchain easy to spot.
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Build
        run: swift build -Xswiftc -strict-concurrency=complete

      - name: Test
        run: swift test -Xswiftc -strict-concurrency=complete

  test-ios:
    name: Test (iOS Simulator)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep -E "^iOS" || true

      - name: Test on iOS Simulator
        # `name=iPhone 16` is the most recent simulator commonly present in
        # the macos-15 image; `OS=latest` lets the runner pick whichever
        # iOS runtime ships with its Xcode without us having to track point
        # releases.
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme CocoaLUTSwift \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -derivedDataPath .build-ios
