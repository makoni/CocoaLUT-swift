name: CI

on:
  push:
    branches: [master]
  pull_request:

# A new push to a PR cancels in-flight runs for the same ref so we don't
# burn minutes on outdated commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-macos:
    name: Test (macOS, Swift 6)
    runs-on: macos-15
    # Hard cap so a hang fails fast instead of burning a full hour.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        # macos-15's default Xcode 16.4 ships Swift 6.1.2, whose Swift Testing
        # console reporter hangs indefinitely on this suite in CI. Pin to
        # Xcode 26.3 (Swift 6.x latest) which matches the local toolchain
        # the package is developed against.
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Build
        run: swift build -Xswiftc -strict-concurrency=complete

      - name: Test
        run: swift test -Xswiftc -strict-concurrency=complete

  test-ios:
    name: Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep -E "^iOS" || true

      - name: Test on iOS Simulator
        # OS=latest picks whichever iOS runtime ships with the active Xcode.
        # iPhone 17 is present on Xcode 26.x; older Xcodes have iPhone 16.
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme CocoaLUTSwift \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            -derivedDataPath .build-ios
